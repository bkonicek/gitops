---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: 1password
spec:
  provider:
    onepasswordSDK:
      vault: Homelab
      auth:
        serviceAccountSecretRef:
          name: onepassword-service-account-token
          key: token
          namespace: 1password
      cache:
        ttl: 5m
        maxSize: 100