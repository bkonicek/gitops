vpa:
  enabled: true

  recommender:
    extraArgs:
      prometheus-address: |
        http://sandbox-oci-prometheus-ope-prometheus.monitoring.svc.cluster.local:9090
      storage: prometheus

controller:
  flags:
    on-by-default: true
    exclude-namespaces: kube-system,kube-public,kube-node-lease

dashboard:
  flags:
    on-by-default: true
    exclude-namespaces: kube-system,kube-public,kube-node-lease
