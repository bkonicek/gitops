traefik:
  providers:
    kubernetesIngressNGINX:
      enabled: true
  service:
    annotations:
      oci.oraclecloud.com/load-balancer-type: "nlb"
    spec:
      externalTrafficPolicy: Local
  metrics:
    prometheus:
      disableAPICheck: true
      serviceMonitor:
        enabled: true
  ingressClass:
    name: traefik
